<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statusboard</title>

    <link rel="stylesheet" href="/main.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="topbar">
      <h1 class="alan-sans-title">Statusboard</h1>
    </div>
    <div class="composer alan-sans-regular">
      <form>
        <textarea
          type="text"
          rows="4"
          cols="30"
          class="alan-sans-regular"
          id="message"
        ></textarea>
        <button type="submit" class="alan-sans-bold">Send</button>
      </form>
    </div>
    <div class="list">
      <div class="post" id="post1">
        <h2 class="alan-sans-bold">Harley J.</h2>
        <p class="alan-sans-regular">Can you... hear mee!!</p>
        <p class="alan-sans-light"></p>Created 22/3/2026 22:00</p>
      </div>
    </div>
    <div class="footer alan-sans-bold">
      <p>Made by <a href="https://thehcj.github.io">Harley J.</a></p>
    </div>
  </body>
</html>
